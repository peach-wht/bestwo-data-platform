server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    # Local debug uses the PostgreSQL SSH tunnel on 127.0.0.1:5432.
    # In k8s, override ORDER_DB_HOST to postgres.infra.svc.cluster.local.
    url: jdbc:postgresql://${ORDER_DB_HOST:127.0.0.1}:${ORDER_DB_PORT:5432}/${ORDER_DB_NAME:bestwo_app}?currentSchema=${ORDER_DB_SCHEMA:order_center}
    username: ${ORDER_DB_USERNAME:bestwo}
    password: ${ORDER_DB_PASSWORD:Bestwo@123}
    driver-class-name: org.postgresql.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  config: classpath:bestwo-logback-spring.xml
  level:
    root: INFO
    com.bestwo.dataplatform.order: INFO

bestwo:
  logging:
    slow-request-threshold-ms: ${BESTWO_LOG_SLOW_REQUEST_THRESHOLD_MS:1000}
  pay:
    provider: ${PAY_PROVIDER:MOCK}
    wechat:
      enabled: ${WECHAT_PAY_ENABLED:false}
      base-url: ${WECHAT_PAY_BASE_URL:https://api.mch.weixin.qq.com}
      app-id: ${WECHAT_PAY_APP_ID:CHANGE_ME}
      merchant-id: ${WECHAT_PAY_MERCHANT_ID:CHANGE_ME}
      merchant-serial-no: ${WECHAT_PAY_MERCHANT_SERIAL_NO:CHANGE_ME}
      private-key-pem: ${WECHAT_PAY_PRIVATE_KEY_PEM:CHANGE_ME}
      api-v3-key: ${WECHAT_PAY_API_V3_KEY:CHANGE_ME}
      platform-public-key-pem: ${WECHAT_PAY_PLATFORM_PUBLIC_KEY_PEM:}
      notify-url: ${WECHAT_PAY_NOTIFY_URL:https://example.com/api/pay/wechat/notify}
