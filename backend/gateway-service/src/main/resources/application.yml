server:
  port: ${SERVER_PORT:8080}
  reactive:
    session:
      cookie:
        http-only: true
        same-site: lax
        path: /

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: warehouse-service-api
          uri: ${WAREHOUSE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/warehouse/**
          filters:
            - StripPrefix=1
        - id: warehouse-service-direct
          uri: ${WAREHOUSE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/warehouse/**
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"

logging:
  level:
    com.bestwo.dataplatform.gateway: INFO

bestwo:
  auth:
    admin:
      username: ${ADMIN_USERNAME:admin}
      password-hash: ${ADMIN_PASSWORD_HASH:$2a$10$FZGdvsAVM5vVWKT8qmR0BuwFJEgaZ9rCxbz4WxYPQbIYEuyt3Y8F6}
      roles:
        - ADMIN
