server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: warehouse-service
          uri: ${WAREHOUSE_SERVICE_URL:http://warehouse-service:8080}
          predicates:
            - Path=/api/**
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"

logging:
  level:
    com.bestwo.dataplatform.gateway: INFO