server:
  port: 8083

spring:
  application:
    name: warehouse-service

doris:
  host: ${DORIS_HOST:127.0.0.1}
  port: ${DORIS_PORT:9030}
  database: ${DORIS_DATABASE:bestwo_dw}
  username: ${DORIS_USERNAME:root}
  password: ${DORIS_PASSWORD:CHANGE_ME}

source-db:
  # Local debug uses the PostgreSQL SSH tunnel on 127.0.0.1:5432.
  # In k8s, override ORDER_DB_HOST to postgres.infra.svc.cluster.local.
  host: ${ORDER_DB_HOST:127.0.0.1}
  port: ${ORDER_DB_PORT:5432}
  database: ${ORDER_DB_NAME:bestwo_app}
  username: ${ORDER_DB_USERNAME:bestwo}
  password: ${ORDER_DB_PASSWORD:Bestwo@123}

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.bestwo.dataplatform.warehouse: INFO
