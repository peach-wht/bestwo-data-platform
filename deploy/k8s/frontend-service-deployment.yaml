apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: app
  labels:
    app.kubernetes.io/name: frontend-service
    app.kubernetes.io/part-of: bestwo-data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend-service
        app.kubernetes.io/part-of: bestwo-data-platform
    spec:
      imagePullSecrets:
        - name: acr-registry-secret
      containers:
        - name: frontend-service
          image: wuhaotian-acr-registry-vpc.cn-wulanchabu.cr.aliyuncs.com/bestwo/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
