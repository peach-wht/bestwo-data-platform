apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-service
  namespace: app
  labels:
    app.kubernetes.io/name: warehouse-service
    app.kubernetes.io/part-of: bestwo-data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: warehouse-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: warehouse-service
        app.kubernetes.io/part-of: bestwo-data-platform
    spec:
      imagePullSecrets:
        - name: acr-registry-secret
      containers:
        - name: warehouse-service
          image: wuhaotian-acr-registry-vpc.cn-wulanchabu.cr.aliyuncs.com/bestwo/warehouse:20260321-1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DORIS_HOST
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: doris-host
            - name: DORIS_PORT
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: doris-port
            - name: DORIS_DATABASE
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: doris-database
            - name: DORIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: doris-username
            - name: DORIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: doris-password
            - name: ORDER_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: order-db-host
            - name: ORDER_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: order-db-port
            - name: ORDER_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: order-db-name
            - name: ORDER_DB_SCHEMA
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: order-db-schema
            - name: ORDER_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: order-db-username
            - name: ORDER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: warehouse-service-secret
                  key: order-db-password
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
