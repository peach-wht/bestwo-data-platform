apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: infra
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/part-of: bestwo-data-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-infra-role
  namespace: infra
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-infra-rolebinding
  namespace: infra
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-infra-role

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-app-deployer
  namespace: app
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-app-deployer-binding
  namespace: app
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-app-deployer
