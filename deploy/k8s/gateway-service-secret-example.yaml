# Optional bootstrap secret for gateway-service auth.
# You can skip this at first deployment because gateway-service has code-level defaults.
# Replace the values below before applying in production.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-service-secret
  namespace: app
type: Opaque
stringData:
  admin-username: admin
  admin-password-hash: REPLACE_WITH_BCRYPT_HASH
