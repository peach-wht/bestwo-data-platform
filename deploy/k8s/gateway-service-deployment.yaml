apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: app
  labels:
    app.kubernetes.io/name: gateway-service
    app.kubernetes.io/part-of: bestwo-data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-service
        app.kubernetes.io/part-of: bestwo-data-platform
    spec:
      imagePullSecrets:
        - name: acr-registry-secret
      containers:
        - name: gateway-service
          image: wuhaotian-acr-registry-vpc.cn-wulanchabu.cr.aliyuncs.com/bestwo/gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: BESTWO_CLUSTER_NAME
              value: bestwo-k3s
            - name: BESTWO_ENV
              value: prod
            - name: WAREHOUSE_SERVICE_URL
              value: http://warehouse-service:8083
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gateway-service-secret
                  key: admin-username
                  optional: true
            - name: ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: gateway-service-secret
                  key: admin-password-hash
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
