# Example business secret for warehouse-service.
# Replace CHANGE_ME before applying.
apiVersion: v1
kind: Secret
metadata:
  name: warehouse-service-secret
  namespace: app
type: Opaque
stringData:
  doris-host: CHANGE_ME
  doris-port: "9030"
  doris-database: bestwo_dw
  doris-username: root
  doris-password: CHANGE_ME
  order-db-host: postgres.infra.svc.cluster.local
  order-db-port: "5432"
  order-db-name: bestwo_app
  order-db-schema: order_center
  order-db-username: bestwo
  order-db-password: CHANGE_ME

---
# Registry secret is intentionally not materialized here with fake base64 data.
# Recommended approach:
# kubectl -n app create secret docker-registry acr-registry-secret \
#   --docker-server=registry.cn-hangzhou.aliyuncs.com \
#   --docker-username=YOUR_ACR_USERNAME \
#   --docker-password=YOUR_ACR_PASSWORD \
#   --docker-email=your-email@example.com
